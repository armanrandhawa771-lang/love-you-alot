<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miss Universe – Ginna Sandhu 👑</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#000;
color:white;
overflow-x:hidden;
}

/* LOCK SCREEN */
#lockScreen{
position:fixed;
width:100%;
height:100vh;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:1000;
}

input{
padding:12px;
border-radius:25px;
border:none;
text-align:center;
}

button{
padding:12px 25px;
border:none;
border-radius:25px;
margin-top:15px;
cursor:pointer;
background:linear-gradient(45deg,#ff0066,#ff4da6);
color:white;
font-weight:bold;
}

/* VIDEO INTRO */
#introVideo{
position:fixed;
width:100%;
height:100vh;
object-fit:cover;
display:none;
z-index:999;
}

/* BACKGROUND ANIMATION */
.bgAnimation{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at center,#111,#000);
z-index:-1;
animation:bgMove 15s infinite alternate;
}

@keyframes bgMove{
0%{background-position:left;}
100%{background-position:right;}
}

/* HEADER */
.header{
text-align:center;
padding:60px 20px;
font-family:'Playfair Display',serif;
font-size:40px;
background:linear-gradient(45deg,#ff0066,#ff99cc);
-webkit-background-clip:text;
color:transparent;
}

/* MAGAZINE GRID */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
padding:40px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:20px;
padding:20px;
text-align:center;
transition:0.5s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 25px pink;
}

.card img{
width:100%;
height:350px;
object-fit:cover;
border-radius:15px;
}

.caption{
margin-top:15px;
color:#ff4da6;
font-size:18px;
}

/* COUNTER */
.counter{
text-align:center;
padding:40px;
font-size:30px;
color:#ff0066;
}

/* POETRY */
.poetry{
text-align:center;
padding:50px;
font-size:22px;
color:#ff99cc;
}
</style>
</head>

<body>

<div class="bgAnimation"></div>

<!-- LOCK -->
<div id="lockScreen">
<h2>🔒 Enter Arman's Birth Date</h2>
<input type="password" id="pass">
<button onclick="unlock()">Unlock</button>
</div>

<!-- INTRO VIDEO -->
<video id="introVideo" muted>
<source src="intro.mp4" type="video/mp4">
</video>

<!-- MUSIC -->
<audio id="music" loop>
<source src="more-nain.mp3" type="audio/mp3">
</audio>

<div id="mainContent" style="display:none;">

<div class="header">
👑 Miss Universe – Ginna Sandhu 👑
<br>
<span style="font-size:20px;">God’s Most Beautiful Creation</span>
</div>

<div class="gallery" id="gallery"></div>

<div class="counter">
⏳ Since 26 November 2025
<br>
<span id="countdown"></span>
</div>

<div class="poetry">
ਇਕ ਤੇਰੀ ਮੇਰੀ ਜੋੜੀ<br>
ਉੱਤੋਂ ਅਕਲ ਦੋਵਾਂ ਨੂੰ ਥੋੜੀ<br>
ਲੜਦੇ ਭਾਵੇ ਲੱਖ ਰਹੀਏ<br>
ਪਰ ਅੰਦਰੋ ਪਿਆਰ ਵੀ ਕਰਦੇ ਚੌਰੀ ਚੌਰੀ 💕
</div>

</div>

<script>

let captions=[
"First time I saw you — 4 August 2025 💘",
"First Instagram Request — 7 November 2025 📩",
"First Message — 26 November 2025 💬",
"First Time Outside — 14 February 2026 ❤️",
"You are heaven in human form 🌸",
"Your smile is my sunrise ☀",
"You are my destiny 💕",
"My world lives in your eyes 🌎",
"God's finest masterpiece 👑"
];

for(let i=1;i<=9;i++){
document.getElementById("gallery").innerHTML+=`
<div class="card">
<img src="photo${i}.jpg">
<div class="caption">${captions[i-1]}</div>
</div>
`;
}

function unlock(){
if(document.getElementById("pass").value=="1-08-2006"){
document.getElementById("lockScreen").style.display="none";
let video=document.getElementById("introVideo");
video.style.display="block";
video.play();
video.onended=function(){
video.style.display="none";
document.getElementById("mainContent").style.display="block";
document.getElementById("music").play();
}
}else{
alert("Wrong Password 😜");
}
}

/* COUNTDOWN */
let start=new Date("Nov 26, 2025 00:00:00").getTime();
setInterval(()=>{
let now=new Date().getTime();
let diff=now-start;
let d=Math.floor(diff/(1000*60*60*24));
let h=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
let m=Math.floor((diff%(1000*60*60))/(1000*60));
let s=Math.floor((diff%(1000*60))/1000);
document.getElementById("countdown").innerHTML=
d+" Days "+h+" Hours "+m+" Min "+s+" Sec";
},1000);

</script>

</body>
</html>
